name: Neuro Council Weekly Pipeline

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Override topic"
        required: false
        type: string
      publish_mode:
        description: "publish or draft"
        required: false
        default: "draft"
        type: choice
        options:
          - draft
          - publish

# Prevent overlapping runs (e.g., schedule + manual)
concurrency:
  group: neuro-council-weekly
  cancel-in-progress: false

# Least privilege for GITHUB_TOKEN (needed for commit/push)
permissions:
  contents: write

# Opt into Node 24 for JavaScript actions now
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  council:
    name: Generate and Publish Council Content
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Pin to full commit SHAs for supply-chain safety.
      # Replace the SHAs below with current official SHAs from:
      # https://github.com/actions/checkout
      # https://github.com/actions/setup-python
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v5.0.0

      - name: Setup Python
        uses: actions/setup-python@42375524aee83cf8fd8e52f6af89ffb8e2f8c8f3 # v6.0.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Prefer requirements.txt for strict pinning in repo:
          # python -m pip install -r requirements.txt
          python -m pip install "requests==2.32.3"

      - name: Run Neuro Council Engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional (only used if your script supports Gmail):
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

          MANUAL_TOPIC: ${{ inputs.topic }}
          PUBLISH_MODE: ${{ inputs.publish_mode || 'draft' }}
        run: |
          # Keep script name aligned with your repo
          python neuro_council_v25_final.py

      - name: Commit output if changed
        run: |
          git config user.name "Neuro Council Bot"
          git config user.email "council@drwasifmalik.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Council output $(date -u '+%Y-%m-%d')"
          git push
