name: Neuro Council Weekly Pipeline

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Override topic (optional)"
        required: false
        type: string
      publish_mode:
        description: "draft or publish"
        required: false
        default: "draft"
        type: choice
        options:
          - draft
          - publish
      dry_run:
        description: "Run without WordPress publish/notifications"
        required: false
        default: false
        type: boolean

concurrency:
  group: neuro-council-weekly
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  council:
    name: Generate and Publish Council Content
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Neuro Council
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MANUAL_TOPIC: ${{ inputs.topic }}
          PUBLISH_MODE: ${{ inputs.publish_mode || 'draft' }}
          WP_VERIFY_TIMEOUT: "45"
          WP_PUBLISH_TIMEOUT: "60"
          WP_VERIFY_RETRIES: "2"
          WP_PUBLISH_RETRIES: "2"
          WP_RETRY_SLEEP: "8"
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python council_engine.py --dry-run
          else
            python council_engine.py
          fi

      - name: Commit output if changed
        run: |
          git config user.name "Neuro Council Bot"
          git config user.email "bot@drwasifmalik.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Council output $(date -u '+%Y-%m-%d')"
          git push
